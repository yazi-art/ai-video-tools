<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 视频生成工具对比</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;
  --surface:#fff;
  --border:#e9eaee;
  --text:#1d1d1f;
  --text-secondary:#6e6e73;
  --accent:#0071e3;
  --accent-light:#e8f2ff;
  --top-tier:#0071e3;
  --domestic:#34c759;
  --opensource:#af52de;
  --specialized:#ff9500;
  --radius:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
body{font-family:"Inter","PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:32px 24px;text-align:center}
.header h1{font-size:24px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px}
.header p{font-size:14px;color:var(--text-secondary);max-width:540px;margin:0 auto}
.main{max-width:1120px;margin:0 auto;padding:32px 20px 64px}
.section{margin-bottom:40px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.section-header .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.section-header h2{font-size:17px;font-weight:600;letter-spacing:-.01em}
.section-header .count{font-size:12px;color:var(--text-secondary);background:var(--bg);padding:1px 8px;border-radius:10px}
.section-desc{font-size:13px;color:var(--text-secondary);margin:-8px 0 16px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:box-shadow .2s,border-color .2s;display:flex;flex-direction:column;position:relative;cursor:pointer}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:#d1d1d6}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-name{font-size:15px;font-weight:600}
.card-name .cn{font-weight:400;font-size:12px;color:var(--text-secondary);margin-left:4px}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-left:8px;margin-top:1px}
.badge-free{background:#e8f5e9;color:#2e7d32}
.badge-paid{background:#fce4ec;color:#c62828}
.badge-freemium{background:#fff3e0;color:#e65100}
.badge-open{background:#f3e5f5;color:#6a1b9a}
.card-desc{font-size:13px;color:var(--text-secondary);margin-bottom:10px;line-height:1.45}
.card-features{list-style:none;font-size:12px;color:var(--text);margin-bottom:10px;flex:1}
.card-features li{position:relative;padding-left:14px;margin-bottom:3px;line-height:1.4}
.card-features li::before{content:"\203A";position:absolute;left:0;color:var(--accent);font-weight:700}
.card-footer{display:flex;gap:8px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border)}
.tag{font-size:11px;background:var(--bg);padding:2px 7px;border-radius:4px;color:var(--text-secondary)}
.top-tier .dot,.top-tier .card{border-color:#d0e3ff}
.domestic .dot,.domestic .card{border-color:#c8e6c9}
.opensource .dot,.opensource .card{border-color:#e1bee7}
.specialized .dot,.specialized .card{border-color:#ffe0b2}
.table-section{margin-top:32px}
.table-section h3{font-size:15px;font-weight:600;margin-bottom:12px}
.compare-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.compare-table th,.compare-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.compare-table th{background:var(--bg);font-weight:600;font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.03em}
.compare-table tr:last-child td{border-bottom:none}
.compare-table td:first-child{font-weight:500}
.check{color:#34c759;font-weight:700}
.dash{color:var(--text-secondary)}
@media(max-width:600px){
  .header{padding:24px 16px}
  .header h1{font-size:20px}
  .main{padding:20px 12px 48px}
  .grid{grid-template-columns:1fr}
  .compare-table{font-size:12px}
  .compare-table th,.compare-table td{padding:8px 10px}
}
</style>
</head>
<body>
<header class="header">
<h1>AI 视频生成工具对比</h1>
<p>主流与新兴视频生成工具一览，涵盖商业产品、开源方案和专项工具</p>
</header>
<div class="main" id="app"></div>
<script>
const tools = [
  {url:"https://sora.com",name:"Sora",cn:"OpenAI",category:"top-tier",desc:"文本/图片生成高画质视频，物理一致性优秀。支持故事板、循环、混合等高级编辑。",features:["最高 1080p 生成","故事板与混合编辑","图生/文生视频"],price:"paid",tags:["Web","API"]},
  {url:"https://runwayml.com",name:"Runway Gen-4",cn:"Runway",category:"top-tier",desc:"角色与场景一致性大幅提升，多模态工作流成熟，适合专业创作者。",features:["角色一致性","多模态编辑","绿幕与后期工具"],price:"freemium",tags:["Web","API"]},
  {url:"https://pika.art",name:"Pika 2.0",cn:"Pika",category:"top-tier",desc:"精确的局部修改能力，可修改画面中特定区域。界面友好，迭代快速。",features:["局部修改（Pikaffect）","图生/文生视频","视频延长"],price:"freemium",tags:["Web"]},
  {url:"https://kling.kuaishou.com",name:"Kling（可灵）",cn:"快手",category:"top-tier",desc:"国内效果最接近 Sora 的模型。支持图生视频、视频延长、运动笔刷。",features:["运动笔刷控制","图生视频","视频延长"],price:"freemium",tags:["Web","App"]},
  {url:"https://lumalabs.ai",name:"Luma Dream Machine",cn:"Luma AI",category:"top-tier",desc:"真实感与光影质量出众，API 已开放给开发者，适合集成。",features:["光影真实感出众","API 开放","快速生成"],price:"freemium",tags:["Web","API"]},
  {url:"https://kling.kuaishou.com",name:"可灵（Kling）",cn:"快手",category:"domestic",desc:"国内公认第一梯队，视频质量高，可控性强，用户基数大。",features:["运动笔刷","图生视频","视频延长"],price:"freemium",tags:["Web","App"]},
  {url:"https://jimeng.jianying.com",name:"即梦（Jimeng）",cn:"字节跳动",category:"domestic",desc:"字节跳动出品，C 端增长迅速。人物和场景一致性表现良好。",features:["人物一致性","场景连贯","社交分享"],price:"freemium",tags:["App","Web"]},
  {url:"https://www.vidu.ai",name:"Vidu",cn:"生数科技",category:"domestic",desc:"清华系团队，长视频生成和风格控制上有特色。支持多风格输出。",features:["长视频生成","风格控制","清华团队"],price:"freemium",tags:["Web"]},
  {url:"https://hailuoai.com",name:"海螺 AI（MiniMax）",cn:"MiniMax",category:"domestic",desc:"人物表情自然度突出，视频质量提升迅速。",features:["表情自然","人物表情好","免费额度充足"],price:"freemium",tags:["Web","App"]},
  {url:"https://tongyi.aliyun.com/wanxiang",name:"通义万相",cn:"阿里巴巴",category:"domestic",desc:"阿里云出品，适合电商和营销场景。与阿里生态集成好。",features:["电商营销场景","阿里云集成","批量化"],price:"freemium",tags:["Web","API"]},
  {url:"https://stability.ai/stable-video",name:"Stable Video Diffusion",cn:"Stability AI",category:"opensource",desc:"开源视频生成模型，社区衍生丰富。支持本地部署和微调。",features:["完全开源","社区衍生多","可本地部署"],price:"open",tags:["本地","GitHub"]},
  {url:"https://github.com/THUDM/CogVideo",name:"CogVideoX",cn:"智谱/清华",category:"opensource",desc:"智谱与清华联合开源，支持多卡部署，可控性不错。",features:["多卡部署","可控性好","开源"],price:"open",tags:["本地","GitHub"]},
  {url:"https://www.genmo.ai",name:"Mochi 1",cn:"Genmo",category:"opensource",desc:"Genmo 开源模型，在开源方案中效果突出。",features:["效果优秀","开源","社区活跃"],price:"open",tags:["本地","Web"]},
  {url:"https://www.heygen.com",name:"HeyGen",cn:"HeyGen",category:"specialized",desc:"数字人口播视频，对口型技术成熟。企业级视频制作平台。",features:["数字人口播","精准对口型","多语言"],price:"paid",tags:["Web","API"]},
  {url:"https://www.d-id.com",name:"D-ID",cn:"D-ID",category:"specialized",desc:"AI 数字人视频生成，从照片生成会说话的头像。",features:["照片转数字人","表情自然","无需录制"],price:"paid",tags:["Web","API"]},
  {url:"https://www.capcut.cn",name:"剪映（CapCut）",cn:"字节跳动",category:"specialized",desc:"集成 AI 视频生成功能，用户量覆盖极广。剪辑加 AI 一站式。",features:["AI 视频生成","剪辑工具集成","模板丰富"],price:"freemium",tags:["App","PC"]},
  {url:"https://elevenlabs.io",name:"ElevenLabs",cn:"ElevenLabs",category:"specialized",desc:"语音合成领先，延伸到视频配音与同步，音画匹配好。",features:["语音合成","视频配音","音画同步"],price:"freemium",tags:["Web","API"]},
];

const categories = [
  {key:"top-tier",label:"头部阵营",desc:"效果最成熟的商用产品",color:"var(--top-tier)"},
  {key:"domestic",label:"国内热门",desc:"中国团队出品，质量快速追赶",color:"var(--domestic)"},
  {key:"opensource",label:"开源 / 本地部署",desc:"可自托管，社区驱动",color:"var(--opensource)"},
  {key:"specialized",label:"专项工具",desc:"聚焦数字人、剪辑、配音等特定场景",color:"var(--specialized)"},
];

const priceLabel = {free:"免费",paid:"付费",freemium:"免费增值",open:"开源"};
const badgeCls = {free:"badge-free",paid:"badge-paid",freemium:"badge-freemium",open:"badge-open"};

function render(){
  const app = document.getElementById("app");
  let html = "";
  for(const cat of categories){
    const items = tools.filter(t => t.category === cat.key);
    if(!items.length) continue;
    html += '<div class="section ' + cat.key + '">';
    html += '<div class="section-header"><span class="dot" style="background:' + cat.color + '"></span><h2>' + cat.label + '</h2><span class="count">' + items.length + '</span></div>';
    html += '<div class="section-desc">' + cat.desc + '</div>';
    html += '<div class="grid">';
    for(const t of items){
      html += '<div class="card" onclick="window.open(\'' + t.url + '\',\'_blank\')" title="前往 ' + t.name + ' 官网">';
      html += '<div class="card-top"><span class="card-name">' + t.name + ' <span class="cn">' + t.cn + '</span></span><span class="badge ' + badgeCls[t.price] + '">' + priceLabel[t.price] + '</span></div>';
      html += '<div class="card-desc">' + t.desc + '</div>';
      html += '<ul class="card-features">' + t.features.map(function(f){return '<li>' + f + '</li>';}).join("") + '</ul>';
      html += '<div class="card-footer">' + t.tags.map(function(tag){return '<span class="tag">' + tag + '</span>';}).join("") + '</div>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  html += '<div class="table-section"><h3>关键能力对比</h3>';
  html += '<table class="compare-table"><thead><tr><th>工具</th><th>文生视频</th><th>图生视频</th><th>视频延长</th><th>局部修改</th><th>API</th><th>本地部署</th></tr></thead><tbody>';

  const m = [
    ["Sora","Y","Y","Y","Y","—","—"],
    ["Runway Gen-4","Y","Y","Y","Y","Y","—"],
    ["Pika 2.0","Y","Y","Y","Y","—","—"],
    ["Kling","Y","Y","Y","—","—","—"],
    ["Luma","Y","Y","Y","—","Y","—"],
    ["Jimeng","Y","Y","—","—","—","—"],
    ["Vidu","Y","Y","Y","—","—","—"],
    ["MiniMax","Y","Y","—","—","—","—"],
    ["通义万相","Y","Y","—","—","Y","—"],
    ["SVD","—","Y","—","—","—","Y"],
    ["CogVideoX","Y","Y","—","—","—","Y"],
    ["Mochi 1","Y","Y","—","—","—","Y"],
  ];

  for(let i=0;i<m.length;i++){
    const r = m[i];
    html += '<tr><td>' + r[0] + '</td>';
    for(let j=1;j<=6;j++){
      const ok = r[j] === "Y";
      html += '<td class="' + (ok ? 'check' : 'dash') + '">' + (ok ? '\u2713' : '\u2014') + '</td>';
    }
    html += '</tr>';
  }

  html += '</tbody></table></div>';
  html += '<p style="font-size:12px;color:var(--text-secondary);margin-top:24px;text-align:center;">信息更新至 2026 年中 · 各工具功能持续迭代中 · 点击卡片可跳转官网</p>';

  app.innerHTML = html;
}

render();
</script>
</body>
</html>
